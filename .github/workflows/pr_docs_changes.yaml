# Workflow that runs on code changes to a pull request.

name: Docs changes
on:
  pull_request:
    branches:
      - main

    paths:
      - docs/**
      - .github/**
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    name: Test documentation builds
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Test documentation builds
        run: quarto render docs
