# Workflow that runs on code changes to a pull request.

name: Docs changes
on:
  pull_request:
    branches:
      - main

    paths:
      - docs/**
      - .github/**
  workflow_dispatch:

jobs:
  Test:
    runs-on: ubuntu-latest
    name: Test documentation builds
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
      - name: Test reference generator smoke build
        run: make docs-reference-smoke
      - name: Test documentation builds
        run: make docs
