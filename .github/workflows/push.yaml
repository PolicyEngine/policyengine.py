# Unified workflow for pushes to main.
#
# Phase 1 (normal push): Lint + Test → Docs + Versioning
#   Versioning commits with message "Update package version".
#   The commit pushes to main, re-triggering this workflow for Phase 2.
#
# Phase 2 (sentinel commit): Publish to PyPI + GitHub Release
#   Skips Lint + Test since the code is identical to Phase 1.

name: Push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ── Phase 1 gates (skip on sentinel commit) ─────────────────
  Lint:
    if: github.event.head_commit.message != 'Update package version'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff format check
        run: ruff format --check .
      - name: Run ruff check
        run: ruff check .

  Test:
    if: github.event.head_commit.message != 'Update package version'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.14']
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - name: Install package
        run: uv pip install -e .[dev] --system
      - name: Install policyengine
        run: uv pip install policyengine --system
      - name: Run tests with coverage
        run: make test
        env:
          HUGGING_FACE_TOKEN: ${{ secrets.HUGGING_FACE_TOKEN }}

  # ── Phase 1: Docs + Versioning (skip on sentinel commit) ──
  Docs:
    name: Deploy documentation
    runs-on: ubuntu-latest
    needs: [Lint, Test]
    if: github.event.head_commit.message != 'Update package version'
    concurrency:
      group: 'pages'
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      BASE_URL: /${{ github.event.repository.name }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
      - name: Install MyST
        run: npm install -g mystmd
      - name: Build HTML Assets
        run: cd docs && myst build --html
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/_build/html'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  Versioning:
    runs-on: ubuntu-latest
    needs: [Lint, Test]
    if: github.event.head_commit.message != 'Update package version'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - name: Fetch tags
        run: git fetch --tags --force
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Build changelog
        run: pip install yaml-changelog towncrier && make changelog
      - name: Preview changelog update
        run: ".github/get-changelog-diff.sh"
      - name: Update changelog
        uses: EndBug/add-and-commit@v9
        with:
          add: "."
          message: Update package version

  # ── Phase 2: Publish (only on sentinel commit) ────────────
  Publish:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message == 'Update package version'
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install package
        run: uv pip install -e .[dev] --system
      - name: Install policyengine
        run: uv pip install policyengine --system
      - name: Publish a git tag
        run: ".github/publish-git-tag.sh"
      - name: Build package
        run: python -m build
      - name: Publish a Python distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI }}
          skip_existing: true
      - name: Create GitHub Release
        run: |
          VERSION=$(python .github/fetch_version.py)
          gh release create "$VERSION" \
            --title "v$VERSION" \
            --notes "See [CHANGELOG.md](https://github.com/PolicyEngine/policyengine.py/blob/main/CHANGELOG.md) for details." \
            --latest
